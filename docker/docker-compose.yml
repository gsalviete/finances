# Ambiente de DESENVOLVIMENTO (Fase 4). Não reflete produção.
# Variáveis vêm do .env na raiz do repo (carregado via compose.yaml raiz).
# `docker compose down` preserva os dados (volume nomeado); apenas `down -v` os remove.
name: finances

x-logging: &dev-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *dev-logging
    networks:
      - finances

  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - '${MONGO_EXPRESS_PORT}:8081'
    healthcheck:
      # $$ = expansão em runtime dentro do container (não interpolação do compose)
      test:
        [
          'CMD-SHELL',
          'wget -qO- "http://$${ME_CONFIG_BASICAUTH_USERNAME}:$${ME_CONFIG_BASICAUTH_PASSWORD}@127.0.0.1:8081/" >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *dev-logging
    networks:
      - finances

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: '3001'
      LOG_LEVEL: ${LOG_LEVEL}
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - '${API_PORT}:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/v1/health >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *dev-logging
    networks:
      - finances

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '3000'
    ports:
      - '${WEB_PORT}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *dev-logging
    networks:
      - finances

volumes:
  mongo-data:

networks:
  finances:
    driver: bridge
